<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Karar Mercii — Yönetim</title>
    <style>
      :root {
        --ac: #7c3aed;
        --ac-d: #5b21b6;
        --ac-dd: #4c1d95;
        --bg: #f6f5fb;
        --card: #ffffff;
        --txt: #1a1a2e;
        --mut: #6b7280;
        --bd: #e7e4f5;
        --red: #dc2626;
        --red-bg: #fef2f2;
        --green: #16a34a;
        --amber: #d97706;
        --amber-bg: #fffbeb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14121c;
          --card: #1e1b2b;
          --txt: #ece9f5;
          --mut: #9b95b3;
          --bd: #322c46;
          --red-bg: #2a1518;
          --amber-bg: #2a2412;
        }
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        font-family: "Nunito", system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--txt);
        font-weight: 700;
        line-height: 1.5;
      }
      /* ── Login gate ── */
      .gate {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 28px;
        gap: 16px;
      }
      .gate h1 {
        font-size: 24px;
        color: var(--ac-dd);
        margin: 0;
      }
      .gate .sub {
        color: var(--mut);
        max-width: 420px;
        font-size: 14px;
      }
      .btn {
        border: none;
        border-radius: 14px;
        padding: 14px 26px;
        font-size: 15px;
        font-weight: 900;
        font-family: inherit;
        cursor: pointer;
        background: var(--ac);
        color: #fff;
        box-shadow: 0 8px 22px rgba(124, 58, 237, 0.3);
      }
      .btn.ghost {
        background: transparent;
        color: var(--ac);
        box-shadow: none;
        border: 1.5px solid var(--bd);
      }
      .btn.sm {
        padding: 7px 14px;
        font-size: 13px;
        border-radius: 10px;
      }
      .btn.danger {
        background: var(--red);
        box-shadow: none;
      }
      .uidbox {
        font-family: ui-monospace, "Cascadia Code", monospace;
        background: var(--card);
        border: 1.5px dashed var(--ac);
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 13px;
        word-break: break-all;
        max-width: 460px;
        user-select: all;
      }
      .banner {
        background: var(--amber-bg);
        border: 1.5px solid var(--amber);
        color: var(--amber);
        border-radius: 12px;
        padding: 12px 16px;
        font-size: 13.5px;
        max-width: 640px;
      }
      /* ── App shell ── */
      .top {
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--card);
        border-bottom: 1.5px solid var(--bd);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .top .brand {
        font-size: 17px;
        font-weight: 900;
        color: var(--ac-dd);
      }
      .top .who {
        color: var(--mut);
        font-size: 12px;
        margin-left: auto;
      }
      .tabs {
        display: flex;
        gap: 6px;
        padding: 12px 12px 0;
        overflow-x: auto;
        position: sticky;
        top: 49px;
        background: var(--bg);
        z-index: 4;
      }
      .tab {
        white-space: nowrap;
        border: none;
        background: transparent;
        color: var(--mut);
        font-family: inherit;
        font-weight: 800;
        font-size: 14px;
        padding: 9px 14px;
        border-radius: 12px 12px 0 0;
        cursor: pointer;
      }
      .tab.on {
        background: var(--card);
        color: var(--ac-dd);
        border: 1.5px solid var(--bd);
        border-bottom: none;
      }
      .tab .cnt {
        display: inline-block;
        min-width: 18px;
        font-size: 11px;
        background: var(--ac);
        color: #fff;
        border-radius: 9px;
        padding: 0 5px;
        margin-left: 4px;
      }
      .wrap {
        padding: 14px 12px 60px;
        max-width: 900px;
        margin: 0 auto;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .card {
        background: var(--card);
        border: 1.5px solid var(--bd);
        border-radius: 14px;
        padding: 13px 15px;
        margin-bottom: 10px;
      }
      .card .meta {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        font-size: 12px;
        color: var(--mut);
        margin-bottom: 6px;
      }
      .card .body {
        font-size: 14.5px;
        color: var(--txt);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .pill {
        font-size: 11px;
        font-weight: 900;
        padding: 2px 9px;
        border-radius: 20px;
        background: var(--ac);
        color: #fff;
      }
      .pill.gray {
        background: var(--bd);
        color: var(--mut);
      }
      .pill.red {
        background: var(--red);
      }
      .pill.green {
        background: var(--green);
      }
      .pill.amber {
        background: var(--amber);
      }
      .quote {
        border-left: 3px solid var(--bd);
        padding-left: 10px;
        color: var(--mut);
        font-size: 13px;
        margin-top: 6px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .empty,
      .err {
        text-align: center;
        color: var(--mut);
        padding: 40px 20px;
        font-size: 14px;
      }
      .err {
        color: var(--red);
      }
      a {
        color: var(--ac);
      }
      .stars {
        color: #f59e0b;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <!-- ══ LOGIN / GATE ══ -->
    <div class="gate" id="gate">
      <h1>🐙 Karar Mercii — Yönetim</h1>
      <div class="sub" id="gate-sub">
        Yönetim paneline erişmek için yetkili Google hesabınla giriş yap.
      </div>
      <button class="btn" id="login-btn">Google ile Giriş Yap</button>
      <div id="gate-extra"></div>
    </div>

    <!-- ══ APP ══ -->
    <div id="app" style="display: none">
      <div class="top">
        <span class="brand">🐙 Yönetim</span>
        <span class="who" id="who"></span>
        <button class="btn ghost sm" id="logout-btn">Çıkış</button>
      </div>
      <div class="tabs" id="tabs">
        <button class="tab on" data-tab="ulasin">📮 Bize Ulaşın<span class="cnt" id="cnt-ulasin">·</span></button>
        <button class="tab" data-tab="puan">⭐ Puanlama<span class="cnt" id="cnt-puan">·</span></button>
        <button class="tab" data-tab="merci">🤖 Merci AI<span class="cnt" id="cnt-merci">·</span></button>
        <button class="tab" data-tab="oda">🚪 Odalar<span class="cnt" id="cnt-oda">·</span></button>
      </div>
      <div class="wrap">
        <div class="row" id="toolbar"></div>
        <div id="list"></div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script>
      // ⚠️ ADMIN UID — kilitlenene kadar boş. Giriş yapınca UID ekranda görünür;
      // onu buraya (ve firestore.rules'a) yazınca panel kilitlenir.
      var ADMIN_UID = "gq8uRlcr4TOwe41qWnKk18DZ0Wt1";

      firebase.initializeApp({
        apiKey: "AIzaSyBE-mhjBnY1HcIo37FOESGSc3wzzektFdQ",
        authDomain: "karar-mercii.firebaseapp.com",
        projectId: "karar-mercii",
        storageBucket: "karar-mercii.firebasestorage.app",
        messagingSenderId: "624143864166",
        appId: "1:624143864166:web:4953d60b840734153938a7",
      });
      var db = firebase.firestore();
      var auth = firebase.auth();
      var provider = new firebase.auth.GoogleAuthProvider();

      var $ = function (id) { return document.getElementById(id); };
      var esc = function (s) {
        return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      };
      function fmtTs(ts) {
        var d;
        if (ts == null) return "—";
        if (typeof ts === "number") d = new Date(ts);
        else if (ts.toDate) d = ts.toDate();
        else if (ts.seconds) d = new Date(ts.seconds * 1000);
        else return "—";
        return d.toLocaleString("tr-TR", {
          day: "2-digit", month: "2-digit", year: "2-digit",
          hour: "2-digit", minute: "2-digit",
        });
      }
      function tsVal(ts) {
        if (ts == null) return 0;
        if (typeof ts === "number") return ts;
        if (ts.toDate) return ts.toDate().getTime();
        if (ts.seconds) return ts.seconds * 1000;
        return 0;
      }

      $("login-btn").onclick = function () {
        auth.signInWithPopup(provider).catch(function (e) {
          $("gate-extra").innerHTML =
            '<div class="banner">Giriş hatası: ' + esc(e.message) + "</div>";
        });
      };
      $("logout-btn").onclick = function () { auth.signOut(); };

      auth.onAuthStateChanged(function (user) {
        if (!user) {
          $("app").style.display = "none";
          $("gate").style.display = "flex";
          $("gate-extra").innerHTML = "";
          return;
        }
        var locked = ADMIN_UID && ADMIN_UID.indexOf("__") !== 0;
        if (locked && user.uid !== ADMIN_UID) {
          // Yetkisiz hesap
          $("app").style.display = "none";
          $("gate").style.display = "flex";
          $("gate-sub").textContent = "Bu hesap yetkili değil.";
          $("gate-extra").innerHTML =
            '<div class="banner">Bu Google hesabı yönetim yetkisine sahip değil. Doğru hesapla gir.</div>' +
            '<button class="btn ghost sm" onclick="auth.signOut()" style="margin-top:10px">Çıkış yap</button>';
          return;
        }
        // Yetkili (veya henüz kilitlenmemiş kurulum modu)
        $("gate").style.display = "none";
        $("app").style.display = "block";
        $("who").textContent = user.email || user.uid;
        if (!locked) {
          // KURULUM MODU: UID'i göster
          $("toolbar").innerHTML =
            '<div class="banner" style="max-width:100%">🔧 <b>Kurulum modu.</b> Panel henüz kilitli değil. Senin admin UID\'in aşağıda — bunu Claude\'a söyle, kurala + panele gömüp kilitlesin. (Kilitlenene kadar Bize Ulaşın / Puanlama / Merci AI okunamaz — kural okuması kapalı; Odalar çalışır.)<div class="uidbox" style="margin-top:8px">' +
            esc(user.uid) + "</div></div>";
        } else {
          $("toolbar").innerHTML = "";
        }
        switchTab(currentTab);
      });

      // ── Sekmeler ──
      var currentTab = "ulasin";
      Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (t) {
        t.onclick = function () {
          Array.prototype.forEach.call(document.querySelectorAll(".tab"), function (x) {
            x.classList.remove("on");
          });
          t.classList.add("on");
          switchTab(t.getAttribute("data-tab"));
        };
      });

      function switchTab(tab) {
        currentTab = tab;
        $("list").innerHTML = '<div class="empty">Yükleniyor…</div>';
        if (tab === "ulasin") loadFeedback("contact");
        else if (tab === "puan") loadFeedback("rating");
        else if (tab === "merci") loadMerci();
        else if (tab === "oda") loadRooms();
      }

      function renderErr(e) {
        var msg = e && e.code === "permission-denied"
          ? "Erişim reddedildi. Bu koleksiyon okuması yalnız kilitli admin UID'ine açık — panel kilitlenip Firestore kuralları güncellenince görünecek."
          : "Hata: " + esc(e && e.message);
        $("list").innerHTML = '<div class="err">' + msg + "</div>";
      }

      // ── Bize Ulaşın + Puanlama (ikisi de feedback koleksiyonu) ──
      function loadFeedback(kind) {
        db.collection("feedback").limit(300).get().then(function (snap) {
          var docs = [];
          snap.forEach(function (d) { docs.push(d.data()); });
          // rating alanı VARSA puanlama, YOKSA iletişim
          var contact = docs.filter(function (x) { return x.rating == null; });
          var rating = docs.filter(function (x) { return x.rating != null; });
          $("cnt-ulasin").textContent = contact.length;
          $("cnt-puan").textContent = rating.length;
          var arr = kind === "rating" ? rating : contact;
          arr.sort(function (a, b) { return tsVal(b.ts) - tsVal(a.ts); });
          if (!arr.length) {
            $("list").innerHTML = '<div class="empty">Kayıt yok.</div>';
            return;
          }
          var konuMap = {
            hata: '<span class="pill amber">🐛 Hata</span>',
            oneri: '<span class="pill">💡 Öneri</span>',
            sikayet: '<span class="pill red">😕 Şikayet</span>',
            diger: '<span class="pill gray">💬 Diğer</span>',
          };
          var html = arr.map(function (x) {
            if (kind === "rating") {
              var n = Math.max(0, Math.min(5, x.rating | 0));
              return (
                '<div class="card"><div class="meta">' +
                '<span class="stars">' + "★".repeat(n) + "☆".repeat(5 - n) + "</span>" +
                '<span class="pill gray">' + x.rating + "/5</span>" +
                "<span>" + fmtTs(x.ts) + "</span></div>" +
                (x.text ? '<div class="body">' + esc(x.text) + "</div>" : '<div class="body" style="color:var(--mut)">(yorum yok)</div>') +
                "</div>"
              );
            }
            return (
              '<div class="card"><div class="meta">' +
              (konuMap[x.konu] || '<span class="pill gray">' + esc(x.konu || "?") + "</span>") +
              "<span>" + fmtTs(x.ts) + "</span>" +
              (x.email ? '<span>· <a href="mailto:' + esc(x.email) + '">' + esc(x.email) + "</a></span>" : "<span>· e-posta yok</span>") +
              "</div>" +
              '<div class="body">' + esc(x.mesaj) + "</div></div>"
            );
          }).join("");
          $("list").innerHTML = html;
        }).catch(renderErr);
      }

      // ── Merci AI feedback ──
      function loadMerci() {
        db.collection("merci_feedback").limit(300).get().then(function (snap) {
          var arr = [];
          snap.forEach(function (d) { arr.push(d.data()); });
          $("cnt-merci").textContent = arr.length;
          arr.sort(function (a, b) { return tsVal(b.ts) - tsVal(a.ts); });
          if (!arr.length) {
            $("list").innerHTML = '<div class="empty">Kayıt yok.</div>';
            return;
          }
          var likes = arr.filter(function (x) { return x.vote === "like"; }).length;
          var dis = arr.length - likes;
          var head =
            '<div class="row"><span class="pill green">👍 ' + likes +
            '</span><span class="pill red">👎 ' + dis + "</span></div>";
          var html = arr.map(function (x) {
            var v = x.vote === "like"
              ? '<span class="pill green">👍 Beğendi</span>'
              : '<span class="pill red">👎 Beğenmedi</span>';
            return (
              '<div class="card"><div class="meta">' + v +
              "<span>" + fmtTs(x.ts) + "</span></div>" +
              (x.userMsg ? '<div class="body">Kullanıcı: ' + esc(x.userMsg) + "</div>" : "") +
              '<div class="quote">Merci: ' + esc(x.reply || "") + "</div></div>"
            );
          }).join("");
          $("list").innerHTML = head + html;
        }).catch(renderErr);
      }

      // ── Odalar (açık odalar + kapat) ──
      function loadRooms() {
        db.collection("rooms").limit(400).get().then(function (snap) {
          var arr = [];
          snap.forEach(function (d) {
            var o = d.data(); o._id = d.id; arr.push(o);
          });
          var open = arr.filter(function (x) { return x.status === "open"; });
          $("cnt-oda").textContent = open.length;
          arr.sort(function (a, b) {
            var rank = function (s) { return s === "open" ? 0 : 1; };
            if (rank(a.status) !== rank(b.status)) return rank(a.status) - rank(b.status);
            return (b.created || 0) - (a.created || 0);
          });
          if (!arr.length) {
            $("list").innerHTML = '<div class="empty">Oda yok.</div>';
            return;
          }
          $("list").innerHTML = arr.map(function (x) {
            var st = x.status === "open"
              ? '<span class="pill green">AÇIK</span>'
              : x.status === "closed"
              ? '<span class="pill gray">kapalı</span>'
              : '<span class="pill amber">' + esc(x.status || "?") + "</span>";
            var pc = x.participants ? Object.keys(x.participants).length : 0;
            var expired = x.closesAt && x.closesAt < Date.now();
            return (
              '<div class="card"><div class="meta">' +
              '<span class="pill">' + esc(x._id) + "</span>" + st +
              (expired && x.status === "open" ? '<span class="pill red">süresi geçmiş</span>' : "") +
              "<span>👥 " + pc + "</span>" +
              "<span>· " + fmtTs(x.created) + "</span></div>" +
              '<div class="body">' + esc(x.name || "(adsız)") +
              (x.options ? ' <span style="color:var(--mut)">— ' + esc((x.options || []).join(", ")) + "</span>" : "") +
              "</div>" +
              (x.status === "open"
                ? '<div class="row" style="margin-top:10px;margin-bottom:0"><button class="btn danger sm" onclick="closeRoom(\'' +
                  esc(x._id) + "')\">Odayı Kapat</button></div>"
                : "") +
              "</div>"
            );
          }).join("");
        }).catch(renderErr);
      }

      window.closeRoom = function (id) {
        if (!confirm(id + " odasını kapatmak istiyor musun?")) return;
        db.collection("rooms").doc(id).update({ status: "closed" })
          .then(function () { loadRooms(); })
          .catch(function (e) { alert("Kapatılamadı: " + e.message); });
      };
    </script>
  </body>
</html>
